<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Request Food - RePlate</title>
  <link rel="stylesheet" href="request.css" />
</head>
<body>
  <header><h1>Request Food</h1></header>

  <main class="form-container">
    <form id="requestForm">
      <label>Your Name:
        <input type="text" name="name" required />
      </label>
      <label>Contact Info:
        <input type="text" name="contact" required />
      </label>
      <label>Food Needed:
        <textarea name="foodNeeded" required></textarea>
      </label>
      <label>Location:
        <input type="text" name="location" required />
      </label>
      <button type="submit">Submit Request</button>
    </form>
  </main>

  <script src="request.js"></script>
</body>
</html>
